<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solven — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0a1628;
    --blue-deep: #0d2e5c;
    --blue-mid: #1a5fa8;
    --slate: #4a6080;
    --mist: #f0f6fe;
    --glass-border: rgba(91,168,240,0.25);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--mist);
    color: var(--navy);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 3rem;
    height: 72px;
    background: rgba(240,246,254,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .nav-logo span {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.35rem;
    color: var(--blue-deep);
    letter-spacing: -0.02em;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .nav-user-menu {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .nav-user-menu[hidden] { display: none !important; }

  .nav-user-email {
    font-size: 0.85rem;
    color: var(--slate);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-logout {
    background: transparent;
    border: 1.5px solid var(--slate);
    color: var(--slate);
    padding: 0.45rem 1rem;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--blue-mid); color: var(--blue-mid); }

  .dashboard-main {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding-top: 72px;
  }
</style>
</head>
<body data-page="app">

<nav>
  <a href="dashboard.html" class="nav-logo">
    <svg width="38" height="38" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="8" width="50" height="60" rx="12" stroke="#1a5fa8" stroke-width="9" fill="none"/>
      <rect x="28" y="28" width="50" height="60" rx="12" stroke="#1a5fa8" stroke-width="9" fill="none"/>
      <line x1="28" y1="72" x2="72" y2="28" stroke="#1a5fa8" stroke-width="9" stroke-linecap="round"/>
    </svg>
    <span>Solven</span>
  </a>

  <div class="nav-right">
    <div class="nav-user-menu" id="navUserMenu">
      <span class="nav-user-email" id="navUserEmail"></span>
      <button class="btn-logout" id="btnLogout" type="button">Log out</button>
    </div>
  </div>
</nav>

<main class="dashboard-main"></main>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
</body>
</html>
